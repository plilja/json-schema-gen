name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify tag matches POM version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pom_version="$(mvn --batch-mode -q help:evaluate -Dexpression=project.version -DforceStdout)"
          if [[ "$pom_version" == *-SNAPSHOT ]]; then
            echo "POM version is a snapshot ($pom_version); Central rejects snapshots." >&2
            exit 1
          fi
          if [[ "$pom_version" != "$tag_version" ]]; then
            echo "Tag $GITHUB_REF_NAME implies version $tag_version but POM is $pom_version." >&2
            exit 1
          fi

      - name: Publish to Maven Central
        run: mvn --batch-mode -Prelease clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
